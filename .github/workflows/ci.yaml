name: Run CI checks

on: pull_request

jobs:
  run_lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check workflow files
        run: |
          curl --fail -L "https://github.com/rhysd/actionlint/releases/download/v${{ env.ACTIONLINT_VERSION }}/actionlint_${{ env.ACTIONLINT_VERSION }}_linux_amd64.tar.gz" -o actionlint.tar.gz
          echo "${{ env.ACTIONLINT_SHA256 }} actionlint.tar.gz" | sha256sum --check -
          tar xzf actionlint.tar.gz actionlint
          ./actionlint -color
        env:
          ACTIONLINT_VERSION: 1.7.7
          ACTIONLINT_SHA256: 023070a287cd8cccd71515fedc843f1985bf96c436b7effaecce67290e7e0757  # pragma: allowlist secret
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14.5"
      - name: Install dependencies
        run: make install
      - name: Run linting and formatting checks
        run: make lint
  docs_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14.5"
      - name: Check documentation build
        run: make docs
  run_test:
    needs: run_lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres # pragma: allowlist secret
          POSTGRES_HOST_AUTH_METHOD: trust
          LC_COLLATE: en_US.UTF8
          LC_CTYPE: en_US.UTF8
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14.5"
      - name: Install dependencies
        run: make install
      - name: Run tests
        run: make test

  cronjobs-test:
    needs: run_test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          install: true

      - name: Build cronjobs container
        uses: docker/build-push-action@v7
        with:
          cache-from: type=gha,scope=cronjobs-ci
          cache-to: type=gha,mode=max,scope=cronjobs-ci
          load: true
          file: cronjobs/Dockerfile
          context: cronjobs/
          tags: remote-settings/cronjobs:latest  # Like with docker compose build cronjobs

      - name: Run cronjobs container
        # `help` command will import all modules, and make sure all dependencies are correctly installed.
        run: docker run --rm remote-settings/cronjobs help

  browser-test:
    runs-on: ubuntu-latest
    env:
      CONFIG_MOUNT: ""
      SRC_MOUNT: ""
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          install: true

      - name: Build web container
        uses: docker/build-push-action@v7
        with:
          cache-from: type=gha,scope=web-ci
          cache-to: type=gha,mode=max,scope=web-ci
          file: RemoteSettings.Dockerfile
          context: .
          tags: remotesettings/local  # Like with docker compose build web

      - name: Build test container
        uses: docker/build-push-action@v7
        with:
          cache-from: type=gha,scope=tests-ci
          cache-to: type=gha,mode=max,scope=tests-ci
          context: browser-tests/

      - name: Run browser tests
        run: make browser-test
